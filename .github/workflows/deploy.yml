name: CI/CD Docker Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_TAG: ${{ steps.build.outputs.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Docker Image
        id: build
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}   # first 7 chars of commit SHA
          echo "IMAGE_TAG=$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

          docker build -t ${{ secrets.DOCKER_USERNAME }}/task-app:$IMAGE_TAG \
                       -t ${{ secrets.DOCKER_USERNAME }}/task-app:latest .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker Images
        run: |
          IMAGE_TAG=${{ steps.build.outputs.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/task-app:$IMAGE_TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/task-app:latest

  deploy-to-staging:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Staging
        run: |
          IMAGE_TAG=${{ needs.build-and-push.outputs.IMAGE_TAG }}
          echo "Deploying image: $IMAGE_TAG"

          docker pull ${{ secrets.DOCKER_USERNAME }}/task-app:$IMAGE_TAG
          docker stop task-app || true
          docker rm task-app || true
          docker run -d -p 3000:3000 --name task-app ${{ secrets.DOCKER_USERNAME }}/task-app:$IMAGE_TAG
