name: CI/CD Docker Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/task-app:latest .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/task-app:latest

  deploy-to-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          echo "Pull the latest Docker image:"
          docker pull ${{ secrets.DOCKER_USERNAME }}/task-app:latest

          echo "Stop existing staging container (if running):"
          docker stop task-app || true
          docker rm task-app || true

          echo "Run staging container:"
          docker run -d -p 3000:3000 --name task-app ${{ secrets.DOCKER_USERNAME }}/task-app:latest
